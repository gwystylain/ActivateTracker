{% extends "base.html" %}
{% block title %}Log in · activateTracker{% endblock %}
{% block content %}
<section class="card narrow">
    <h1>Log in</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="/login" autocomplete="off">
        <label>
            <span>Username</span>
            <input type="text" name="username" required autofocus>
        </label>
        <label>
            <span>Password</span>
            <input type="password" name="password" required>
        </label>
        <button type="submit">Log in</button>
    </form>
    <p class="muted small">Password is set in <code>config.yaml</code> on the server.</p>
</section>
{% endblock %}
