services:
  activatetracker:
    image: ghcr.io/gwystylain/activatetracker:latest
    pull_policy: always
    container_name: activatetracker
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /mnt/HDDs/Applications/ActivateTracker/data:/data
      - /mnt/HDDs/Applications/ActivateTracker/config.yaml:/app/config.yaml:ro
    environment:
      ACTIVATETRACKER_CONFIG: /app/config.yaml
      ACTIVATETRACKER_DB: /data/tracker.db
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
