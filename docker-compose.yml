services:
  activatetracker:
    build: .
    image: activate-tracker:latest
    container_name: activatetracker
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      ACTIVATETRACKER_CONFIG: /app/config.yaml
      ACTIVATETRACKER_DB: /data/tracker.db
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
